name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-latest
            bun_target: bun-darwin-arm64
            artifact: threaddy-macos-arm64
          - target: macos-x64
            runner: macos-13
            bun_target: bun-darwin-x64
            artifact: threaddy-macos-x64
          - target: linux-x64
            runner: ubuntu-latest
            bun_target: bun-linux-x64
            artifact: threaddy-linux-x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            bun_target: bun-linux-arm64
            artifact: threaddy-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CSS
        run: bun run build:css

      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile --target=${{ matrix.bun_target }} src/main.ts --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec mv {} release/ \;

      - name: Generate checksums
        working-directory: release
        run: sha256sum * > checksums.txt

      - name: Extract changelog for tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Threaddy ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release/threaddy-macos-arm64
            release/threaddy-macos-x64
            release/threaddy-linux-x64
            release/threaddy-linux-arm64
            release/checksums.txt
